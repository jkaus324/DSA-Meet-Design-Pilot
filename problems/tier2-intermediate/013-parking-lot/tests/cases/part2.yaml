- name: flat_rate
  call: parking_simulate
  args:
    - - { kind: "new", i1: 1 }
      - { kind: "add_spot", i1: 0, s1: "M" }
      - { kind: "set_pricing", s1: "flat", i1: 10 }
      - { kind: "park", s1: "CAR1", s2: "C", i1: 1000, i2: 0, s3: "G1" }
      - { kind: "unpark", i1: 0, i2: 8600, s1: "G2" }
  expect: ["ok", "ok", "ok", "T1", "10.00"]

