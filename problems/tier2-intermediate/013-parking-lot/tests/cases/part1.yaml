      - { kind: "available_floor", i1: 1, s1: "M" }
  expect: ["ok", "ok", "ok", "ok", "2", "1"]

- name: nearest_floor_allocation
  call: parking_simulate
  args:
    - - { kind: "new", i1: 3 }
      - { kind: "add_spot", i1: 0, s1: "S" }
      - { kind: "add_spot", i1: 1, s1: "M" }
      - { kind: "add_spot", i1: 2, s1: "M" }
      - { kind: "park", s1: "CAR3", s2: "C", i1: 1000, i2: 0 }
      - { kind: "ticket_floor", i1: 0 }
  expect: ["ok", "ok", "ok", "ok", "T1", "1"]

- name: full_lot
  call: parking_simulate
  args:
    - - { kind: "new", i1: 1 }
      - { kind: "add_spot", i1: 0, s1: "M" }
      - { kind: "park", s1: "C1", s2: "C", i1: 1000, i2: 0 }
      - { kind: "park", s1: "C2", s2: "C", i1: 1000, i2: 1 }
  expect: ["ok", "ok", "T1", ""]
