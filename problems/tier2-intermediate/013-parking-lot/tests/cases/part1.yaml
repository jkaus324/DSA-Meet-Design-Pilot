- name: park_car
  call: parking_simulate
  args:
    - - { kind: "new", i1: 2 }
      - { kind: "add_spot", i1: 0, s1: "M" }
      - { kind: "park", s1: "ABC123", s2: "C", i1: 1000, i2: 0 }
      - { kind: "ticket_floor", i1: 0 }
  expect: ["ok", "ok", "T1", "0"]

- name: park_motorcycle
  call: parking_simulate
  args:
    - - { kind: "new", i1: 1 }
      - { kind: "add_spot", i1: 0, s1: "S" }
      - { kind: "park", s1: "MOTO1", s2: "M", i1: 1000, i2: 0 }
  expect: ["ok", "ok", "T1"]

