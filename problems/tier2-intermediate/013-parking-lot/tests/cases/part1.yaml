- name: truck_large_spot
  call: parking_simulate
  args:
    - - { kind: "new", i1: 1 }
      - { kind: "add_spot", i1: 0, s1: "M" }
      - { kind: "add_spot", i1: 0, s1: "L" }
      - { kind: "park", s1: "TRUCK1", s2: "T", i1: 1000, i2: 0 }
  expect: ["ok", "ok", "ok", "T1"]

- name: unpark_frees_spot
  call: parking_simulate
  args:
    - - { kind: "new", i1: 1 }
      - { kind: "add_spot", i1: 0, s1: "M" }
      - { kind: "park", s1: "CAR2", s2: "C", i1: 1000, i2: 0 }
      - { kind: "available", s1: "M" }
      - { kind: "unpark", i1: 0, i2: 4600 }
      - { kind: "available", s1: "M" }
  expect: ["ok", "ok", "T1", "0", "3600.00", "1"]

- name: invalid_ticket
  call: parking_simulate
  args:
    - - { kind: "new", i1: 1 }
      - { kind: "unpark_id", s1: "INVALID", i2: 5000 }
  expect: ["ok", "-1"]

- name: available_spots_count
  call: parking_simulate
  args:
    - - { kind: "new", i1: 2 }
      - { kind: "add_spot", i1: 0, s1: "S" }
      - { kind: "add_spot", i1: 0, s1: "M" }
      - { kind: "add_spot", i1: 0, s1: "M" }
      - { kind: "add_spot", i1: 1, s1: "L" }
      - { kind: "available", s1: "S" }
      - { kind: "available", s1: "M" }
      - { kind: "available", s1: "L" }
  expect: ["ok", "ok", "ok", "ok", "ok", "1", "2", "1"]

- name: available_spots_by_floor
