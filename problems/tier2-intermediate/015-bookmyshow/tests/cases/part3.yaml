- name: find_2_contiguous_available
  call: show_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_theater", s1: "T1", s2: "PVR", s3: "Mumbai" }
      - { kind: "add_show", s1: "S1", s2: "T1", s3: "M", s4: "18:00", i1: 3, i2: 5 }
      - { kind: "find_contig", s1: "S1", i1: 2, i2: 0 }
      - { kind: "contig_at", i1: 0 }
      - { kind: "contig_at", i1: 1 }
  expect: ["ok", "ok", "ok", "2", "0,0", "0,1"]

