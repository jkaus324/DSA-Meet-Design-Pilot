- name: book_seats_success
  call: show_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_theater", s1: "T1", s2: "PVR", s3: "Mumbai" }
      - { kind: "add_show", s1: "S1", s2: "T1", s3: "Inception", s4: "18:00", i1: 5, i2: 10 }
      - { kind: "book", s1: "B1", s2: "S1", s3: "0,0;0,1;0,2", s4: "user1" }
      - { kind: "available_count", s1: "S1" }
  expect: ["ok", "ok", "ok", "ok", "47"]

- name: double_booking_prevention
  call: show_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_theater", s1: "T1", s2: "PVR", s3: "Mumbai" }
      - { kind: "add_show", s1: "S1", s2: "T1", s3: "Inception", s4: "18:00", i1: 5, i2: 10 }
      - { kind: "book", s1: "B1", s2: "S1", s3: "0,0;0,1", s4: "user1" }
      - { kind: "book", s1: "B2", s2: "S1", s3: "0,0;0,2", s4: "user2" }
  expect: ["ok", "ok", "ok", "ok", "fail"]

- name: atomic_booking
  call: show_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_theater", s1: "T1", s2: "PVR", s3: "Mumbai" }
      - { kind: "add_show", s1: "S1", s2: "T1", s3: "Inception", s4: "18:00", i1: 5, i2: 10 }
      - { kind: "book", s1: "B1", s2: "S1", s3: "0,0", s4: "user1" }
      - { kind: "book", s1: "B2", s2: "S1", s3: "0,0;0,1", s4: "user2" }
      - { kind: "available_has", s1: "S1", i2: 0, i3: 1 }
  expect: ["ok", "ok", "ok", "ok", "fail", "yes"]

