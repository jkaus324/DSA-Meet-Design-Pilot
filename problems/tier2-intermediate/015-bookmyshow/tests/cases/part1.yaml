- name: search_movies_by_city
  call: show_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_theater", s1: "T1", s2: "PVR Phoenix", s3: "Mumbai" }
      - { kind: "add_show", s1: "S1", s2: "T1", s3: "Inception", s4: "18:00", i1: 5, i2: 10 }
      - { kind: "movies_count", s1: "Mumbai" }
      - { kind: "movies_contains", s1: "Mumbai", s2: "Inception" }
  expect: ["ok", "ok", "ok", "1", "yes"]

- name: multiple_movies_same_city
  call: show_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_theater", s1: "T1", s2: "PVR", s3: "Mumbai" }
      - { kind: "add_theater", s1: "T2", s2: "INOX", s3: "Mumbai" }
      - { kind: "add_show", s1: "S1", s2: "T1", s3: "Inception",    s4: "18:00", i1: 5, i2: 10 }
      - { kind: "add_show", s1: "S2", s2: "T2", s3: "Interstellar", s4: "20:00", i1: 5, i2: 10 }
      - { kind: "movies_count", s1: "Mumbai" }
      - { kind: "movies_contains", s1: "Mumbai", s2: "Inception" }
      - { kind: "movies_contains", s1: "Mumbai", s2: "Interstellar" }
  expect: ["ok", "ok", "ok", "ok", "ok", "2", "yes", "yes"]

