- name: lock_seats_success
  call: show_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_theater", s1: "T1", s2: "PVR", s3: "Mumbai" }
      - { kind: "add_show", s1: "S1", s2: "T1", s3: "Inception", s4: "18:00", i1: 5, i2: 10 }
      - { kind: "lock", s1: "S1", s2: "0,0;0,1", s3: "user1", i1: 5, i2: 1000, i3: 0 }
      - { kind: "available_count", s1: "S1", i1: 1000 }
  expect: ["ok", "ok", "ok", "LOCK_1", "48"]

