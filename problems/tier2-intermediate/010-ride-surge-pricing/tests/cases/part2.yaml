- name: fare_with_observer_baseline
  comment: "fare always >= baseFare since surge always >= 1"
  call: calculateFare
  args:
    - { userId: "u1", pickup: "A", dropoff: "B", rideType: "economy" }
    - { baseFare: 100.0, availableDrivers: 5, activeRideRequests: 10, timeOfDay: "evening", weather: "rain" }
  # ratio 2.0 -> demand 1.5; rain -> 1.3; evening -> 1.5; max => 1.5; fare 150
  expect_close: 150.0
  epsilon: 0.01

- name: fare_storm_evening
  comment: "storm + evening + high demand => 2.0; fare = 200"
  call: calculateFare
  args:
    - { userId: "u1", pickup: "A", dropoff: "B", rideType: "economy" }
    - { baseFare: 100.0, availableDrivers: 1, activeRideRequests: 10, timeOfDay: "evening", weather: "storm" }
  # ratio 10 -> demand 2.0; storm 1.8; evening 1.5; max => 2.0
  expect_close: 200.0
  epsilon: 0.01
