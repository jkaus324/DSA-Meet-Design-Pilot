- name: most_vacant_strategy
  call: ride_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_user", s1: "Rohan" }
      - { kind: "add_user", s1: "Deepa" }
      - { kind: "add_user", s1: "Amit" }
      - { kind: "add_user", s1: "Priya" }
      - { kind: "add_veh", s1: "Rohan", s2: "Swift", s3: "KA-01-1234" }
      - { kind: "add_veh", s1: "Deepa", s2: "XUV",   s3: "KA-02-5678" }
      - { kind: "add_veh", s1: "Amit",  s2: "Swift", s3: "KA-03-9012" }
      - { kind: "offer", s1: "Rohan", s2: "Bangalore", s3: "Mysore",  s4: "KA-01-1234", i1: 3, i2: 0 }
      - { kind: "offer", s1: "Deepa", s2: "Bangalore", s3: "Mysore",  s4: "KA-02-5678", i1: 5, i2: 1 }
      - { kind: "offer", s1: "Amit",  s2: "Bangalore", s3: "Chennai", s4: "KA-03-9012", i1: 2, i2: 2 }
      - { kind: "select_mv", s1: "Priya", s2: "Bangalore", s3: "Mysore", i1: 1, i2: 3 }
      - { kind: "ride_driver", i2: 3 }
  expect: ["ok", "ok", "ok", "ok", "ok", "ok", "ok", "ok", "RIDE-1", "RIDE-2", "RIDE-3", "RIDE-2", "Deepa"]

