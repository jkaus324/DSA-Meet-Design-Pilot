- name: end_ride_marks_inactive
  call: ride_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_user", s1: "Rohan" }
      - { kind: "add_veh", s1: "Rohan", s2: "Swift", s3: "KA-01-1234" }
      - { kind: "offer", s1: "Rohan", s2: "B", s3: "M", s4: "KA-01-1234", i1: 3, i2: 0 }
      - { kind: "ride_active", i2: 0 }
      - { kind: "end", i2: 0 }
      - { kind: "ride_active", i2: 0 }
  expect: ["ok", "ok", "ok", "RIDE-1", "yes", "ok", "no"]

- name: vehicle_freed_after_end
  call: ride_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_user", s1: "Rohan" }
      - { kind: "add_veh", s1: "Rohan", s2: "Swift", s3: "KA-01-1234" }
      - { kind: "offer", s1: "Rohan", s2: "B", s3: "M", s4: "KA-01-1234", i1: 3, i2: 0 }
      - { kind: "offer", s1: "Rohan", s2: "B", s3: "C", s4: "KA-01-1234", i1: 2, i2: 1 }
      - { kind: "end", i2: 0 }
      - { kind: "offer", s1: "Rohan", s2: "B", s3: "C", s4: "KA-01-1234", i1: 2, i2: 2 }
  expect: ["ok", "ok", "ok", "RIDE-1", "", "ok", "RIDE-2"]

