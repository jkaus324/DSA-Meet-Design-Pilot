- name: full_workflow
  call: ride_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_user", s1: "Rohan" }
      - { kind: "add_user", s1: "Deepa" }
      - { kind: "add_veh", s1: "Rohan", s2: "Swift", s3: "KA-01-1234" }
      - { kind: "offer", s1: "Rohan", s2: "B", s3: "M", s4: "KA-01-1234", i1: 2, i2: 0 }
      - { kind: "select_mv", s1: "Deepa", s2: "B", s3: "M", i1: 1, i2: 1 }
      - { kind: "ride_avail", i2: 0 }
      - { kind: "end", i2: 0 }
      - { kind: "ride_active", i2: 0 }
      - { kind: "offer", s1: "Rohan", s2: "M", s3: "B", s4: "KA-01-1234", i1: 2, i2: 2 }
      - { kind: "user_offered", s1: "Rohan" }
      - { kind: "user_taken", s1: "Deepa" }
  expect: ["ok", "ok", "ok", "ok", "RIDE-1", "RIDE-1", "1", "ok", "no", "RIDE-2", "2", "1"]
