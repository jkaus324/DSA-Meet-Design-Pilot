- name: post_and_get_feed
  call: twitter_simulate
  args:
    - - { kind: "new" }
      - { kind: "post", i1: 1, i2: 101 }
      - { kind: "feed_size", i1: 1 }
      - { kind: "feed_at",   i1: 1, i2: 0 }
  expect: ["ok", "ok", "1", "101"]

- name: follow_and_feed
  call: twitter_simulate
  args:
    - - { kind: "new" }
      - { kind: "post", i1: 1, i2: 101 }
      - { kind: "post", i1: 2, i2: 201 }
      - { kind: "follow", i1: 1, i2: 2 }
      - { kind: "feed_size", i1: 1 }
      - { kind: "feed_at", i1: 1, i2: 0 }
      - { kind: "feed_at", i1: 1, i2: 1 }
  expect: ["ok", "ok", "ok", "ok", "2", "201", "101"]

