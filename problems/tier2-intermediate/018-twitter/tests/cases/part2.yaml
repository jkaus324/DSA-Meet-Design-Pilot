- name: kway_merge_interleaved
  call: twitter_simulate
  args:
    - - { kind: "new" }
      - { kind: "post", i1: 1, i2: 10 }
      - { kind: "post", i1: 2, i2: 20 }
      - { kind: "post", i1: 1, i2: 11 }
      - { kind: "post", i1: 2, i2: 21 }
      - { kind: "follow", i1: 1, i2: 2 }
      - { kind: "feed_size", i1: 1 }
      - { kind: "feed_at", i1: 1, i2: 0 }
      - { kind: "feed_at", i1: 1, i2: 1 }
      - { kind: "feed_at", i1: 1, i2: 2 }
      - { kind: "feed_at", i1: 1, i2: 3 }
  expect: ["ok", "ok", "ok", "ok", "ok", "ok", "4", "21", "11", "20", "10"]

