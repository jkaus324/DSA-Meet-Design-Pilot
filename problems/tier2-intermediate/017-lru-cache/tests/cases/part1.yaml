- name: basic_put_get
  call: lru_simulate
  args:
    - - { kind: "new", i1: 2 }
      - { kind: "put", i1: 1, i2: 10 }
      - { kind: "put", i1: 2, i2: 20 }
      - { kind: "get", i1: 1 }
      - { kind: "get", i1: 2 }
  expect: ["ok", "ok", "ok", "10", "20"]

- name: get_nonexistent
  call: lru_simulate
  args:
    - - { kind: "new", i1: 2 }
      - { kind: "get", i1: 99 }
      - { kind: "put", i1: 1, i2: 10 }
      - { kind: "get", i1: 2 }
  expect: ["ok", "-1", "ok", "-1"]

- name: eviction_on_capacity
