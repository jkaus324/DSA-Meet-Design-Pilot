- name: capacity_eviction_listener
  call: lru_simulate
  args:
    - - { kind: "new", i1: 2 }
      - { kind: "add_listener", i1: 0 }
      - { kind: "put_t", i1: 1, i2: 10, i3: 1000, i4: 0 }
      - { kind: "put_t", i1: 2, i2: 20, i3: 1000, i4: 0 }
      - { kind: "put_t", i1: 3, i2: 30, i3: 1000, i4: 0 }
      - { kind: "events_count", i1: 0 }
      - { kind: "event_key",    i1: 0, i2: 0 }
      - { kind: "event_value",  i1: 0, i2: 0 }
      - { kind: "event_reason", i1: 0, i2: 0 }
  expect: ["ok", "ok", "ok", "ok", "ok", "1", "1", "10", "CAPACITY"]

