- name: simplification_preserves_net
  call: splitwise_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_user", s1: "A" }
      - { kind: "add_user", s1: "B" }
      - { kind: "add_user", s1: "C" }
      - { kind: "add_expense", s1: "E1", s2: "A", s3: "A,B,C", i1: 600 }
      - { kind: "add_expense", s1: "E2", s2: "B", s3: "A,B,C", i1: 300 }
      - { kind: "simplify_total_from", s1: "C" }
      - { kind: "simplify_total_to",   s1: "A" }
  expect: ["ok", "ok", "ok", "ok", "ok", "ok", "300.00", "300.00"]
