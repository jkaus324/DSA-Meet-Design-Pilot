- name: multi_user_multi_expense
  call: splitwise_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_user", s1: "A" }
      - { kind: "add_user", s1: "B" }
      - { kind: "add_user", s1: "C" }
      - { kind: "add_user", s1: "D" }
      - { kind: "add_expense", s1: "E1", s2: "A", s3: "A,B,C,D", i1: 400 }
      - { kind: "add_expense", s1: "E2", s2: "B", s3: "A,B,C,D", i1: 200 }
      - { kind: "balance", s1: "B", s2: "A" }
      - { kind: "balance", s1: "C", s2: "A" }
      - { kind: "balance", s1: "C", s2: "B" }
      - { kind: "balance", s1: "D", s2: "A" }
      - { kind: "balance", s1: "D", s2: "B" }
  expect: ["ok", "ok", "ok", "ok", "ok", "ok", "ok", "50.00", "100.00", "50.00", "100.00", "50.00"]

