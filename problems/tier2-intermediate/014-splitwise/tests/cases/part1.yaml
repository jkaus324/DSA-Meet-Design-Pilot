- name: simple_equal_split
  call: splitwise_simulate
  args:
    - - { kind: "new" }
      - { kind: "add_user", s1: "alice", s2: "Alice" }
      - { kind: "add_user", s1: "bob",   s2: "Bob" }
      - { kind: "add_user", s1: "charlie", s2: "Charlie" }
      - { kind: "add_expense", s1: "E1", s2: "alice", s3: "alice,bob,charlie", i1: 300 }
      - { kind: "balance", s1: "bob",     s2: "alice" }
      - { kind: "balance", s1: "charlie", s2: "alice" }
      - { kind: "balance", s1: "alice",   s2: "alice" }
  expect: ["ok", "ok", "ok", "ok", "ok", "100.00", "100.00", "0.00"]

