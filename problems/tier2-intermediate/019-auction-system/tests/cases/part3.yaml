    - - { kind: "new" }
      - { kind: "register", s1: "A", s2: "SELLER", i1: 0 }
      - { kind: "register", s1: "B", s2: "BUYER",  i1: 1 }
      - { kind: "create", i1: 0, s2: "Vase", i3: 200, i2: 0, s3: "SEALED" }
      - { kind: "bid", i1: 0, i2: 1, i3: 100 }
      - { kind: "bid", i1: 0, i2: 1, i3: 200 }
      - { kind: "bid", i1: 0, i2: 1, i3: 201 }
  expect: ["ok", "1", "2", "1", "fail", "fail", "ok"]

- name: buynow_strategy
  call: auction_simulate
  args:
    - - { kind: "new" }
      - { kind: "register", s1: "A", s2: "SELLER", i1: 0 }
      - { kind: "register", s1: "B", s2: "BUYER",  i1: 1 }
      - { kind: "create", i1: 0, s2: "Guitar", i3: 100, i2: 0, s3: "BUYNOW" }
      - { kind: "bid", i1: 0, i2: 1, i3: 120 }
      - { kind: "bid", i1: 0, i2: 1, i3: 150 }
