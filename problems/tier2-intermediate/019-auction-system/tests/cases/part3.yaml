- name: ascending_strategy
  call: auction_simulate
  args:
    - - { kind: "new" }
      - { kind: "register", s1: "A", s2: "SELLER", i1: 0 }
      - { kind: "register", s1: "B", s2: "BUYER",  i1: 1 }
      - { kind: "register", s1: "C", s2: "BUYER",  i1: 2 }
      - { kind: "create", i1: 0, s2: "Laptop", i3: 500, i2: 0, s3: "ASCENDING" }
      - { kind: "bid", i1: 0, i2: 1, i3: 600 }
      - { kind: "bid", i1: 0, i2: 2, i3: 550 }
      - { kind: "bid", i1: 0, i2: 2, i3: 700 }
      - { kind: "winning", i1: 0 }
  expect: ["ok", "1", "2", "3", "1", "ok", "fail", "ok", "700"]

- name: sealed_bid_strategy
  call: auction_simulate
  args:
    - - { kind: "new" }
      - { kind: "register", s1: "A", s2: "SELLER", i1: 0 }
      - { kind: "register", s1: "B", s2: "BUYER",  i1: 1 }
      - { kind: "register", s1: "C", s2: "BUYER",  i1: 2 }
      - { kind: "create", i1: 0, s2: "Art", i3: 100, i2: 0, s3: "SEALED" }
      - { kind: "bid", i1: 0, i2: 1, i3: 500 }
      - { kind: "bid", i1: 0, i2: 2, i3: 200 }
      - { kind: "winning", i1: 0 }
      - { kind: "close", i1: 0 }
      - { kind: "winning", i1: 0 }
  expect: ["ok", "1", "2", "3", "1", "ok", "ok", "-1", "ok", "500"]

