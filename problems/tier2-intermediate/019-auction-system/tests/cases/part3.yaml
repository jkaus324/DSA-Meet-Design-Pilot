- name: mixed_strategies
  call: auction_simulate
  args:
    - - { kind: "new" }
      - { kind: "register", s1: "A", s2: "SELLER", i1: 0 }
      - { kind: "register", s1: "B", s2: "BUYER",  i1: 1 }
      - { kind: "create", i1: 0, s2: "Item1", i3: 100, i2: 0, s3: "ASCENDING" }
      - { kind: "create", i1: 0, s2: "Item2", i3: 100, i2: 1, s3: "SEALED" }
      - { kind: "create", i1: 0, s2: "Item3", i3: 100, i2: 2, s3: "BUYNOW" }
      - { kind: "bid", i1: 0, i2: 1, i3: 200 }
