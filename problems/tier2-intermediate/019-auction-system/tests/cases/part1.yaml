      - { kind: "register", s1: "Bob", s2: "SELLER", i1: 1 }
      - { kind: "create", i1: 0, s2: "Tablet", i3: 200, i2: 0 }
      - { kind: "bid", i1: 0, i2: 1, i3: 300 }
  expect: ["ok", "1", "2", "1", "fail"]

- name: only_sellers_create
  call: auction_simulate
  args:
    - - { kind: "new" }
      - { kind: "register", s1: "Bob", s2: "BUYER", i1: 0 }
      - { kind: "create", i1: 0, s2: "Camera", i3: 300, i2: 0 }
  expect: ["ok", "1", "-1"]

- name: no_bids_returns_negative
  call: auction_simulate
  args:
    - - { kind: "new" }
      - { kind: "register", s1: "Alice", s2: "SELLER", i1: 0 }
      - { kind: "create", i1: 0, s2: "Keyboard", i3: 75, i2: 0 }
      - { kind: "winning", i1: 0 }
