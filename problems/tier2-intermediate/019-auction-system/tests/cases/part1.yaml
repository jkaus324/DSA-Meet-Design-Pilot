- name: independent_auctions
  call: auction_simulate
  args:
    - - { kind: "new" }
      - { kind: "register", s1: "Alice", s2: "SELLER", i1: 0 }
      - { kind: "register", s1: "Bob", s2: "BUYER", i1: 1 }
      - { kind: "create", i1: 0, s2: "Item1", i3: 100, i2: 0 }
      - { kind: "create", i1: 0, s2: "Item2", i3: 200, i2: 1 }
      - { kind: "bid", i1: 0, i2: 1, i3: 150 }
      - { kind: "bid", i1: 1, i2: 1, i3: 300 }
      - { kind: "winning", i1: 0 }
      - { kind: "winning", i1: 1 }
  expect: ["ok", "1", "2", "1", "2", "ok", "ok", "150", "300"]
