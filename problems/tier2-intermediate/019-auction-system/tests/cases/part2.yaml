- name: close_with_bids
  call: auction_simulate
  args:
    - - { kind: "new" }
      - { kind: "register", s1: "A", s2: "SELLER", i1: 0 }
      - { kind: "register", s1: "B", s2: "BUYER",  i1: 1 }
      - { kind: "create", i1: 0, s2: "Laptop", i3: 500, i2: 0 }
      - { kind: "bid", i1: 0, i2: 1, i3: 600 }
      - { kind: "close", i1: 0 }
      - { kind: "status", i1: 0 }
      - { kind: "winning", i1: 0 }
  expect: ["ok", "1", "2", "1", "ok", "ok", "CLOSED", "600"]

