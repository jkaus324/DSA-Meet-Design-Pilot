- name: fault_isolation
  call: logger_simulate
  args:
    - - { kind: "reset" }
      - { kind: "set_level", s1: "DEBUG" }
      - { kind: "add_failing" }
      - { kind: "add_dest", s1: "test:0:plain" }
      - { kind: "log", s1: "ERROR", s2: "fault isolation" }
      - { kind: "dest_size", s1: "test:0" }
      - { kind: "dest_contains", s1: "test:0", i1: 0, s2: "fault isolation" }
      - { kind: "rm_failing" }
      - { kind: "rm_dest", s1: "test:0" }
  expect: ["ok", "ok", "ok", "ok", "ok", "1", "yes", "ok", "ok"]

- name: remove_destination
  call: logger_simulate
  args:
    - - { kind: "reset" }
      - { kind: "set_level", s1: "DEBUG" }
      - { kind: "add_dest", s1: "test:0:plain" }
      - { kind: "log", s1: "INFO", s2: "before remove" }
      - { kind: "dest_size", s1: "test:0" }
      - { kind: "rm_dest", s1: "test:0" }
      - { kind: "log", s1: "INFO", s2: "after remove" }
      - { kind: "dest_size", s1: "test:0" }
  expect: ["ok", "ok", "ok", "ok", "1", "ok", "ok", "1"]

- name: level_filtering_before_destinations
  call: logger_simulate
  args:
    - - { kind: "reset" }
      - { kind: "set_level", s1: "ERROR" }
      - { kind: "add_dest", s1: "test:0:plain" }
      - { kind: "log", s1: "INFO",  s2: "filtered" }
      - { kind: "log", s1: "ERROR", s2: "passes" }
      - { kind: "dest_size", s1: "test:0" }
      - { kind: "dest_contains", s1: "test:0", i1: 0, s2: "passes" }
      - { kind: "rm_dest", s1: "test:0" }
  expect: ["ok", "ok", "ok", "ok", "ok", "1", "yes", "ok"]

- name: no_destinations_no_crash
  call: logger_simulate
  args:
    - - { kind: "reset" }
      - { kind: "set_level", s1: "DEBUG" }
      - { kind: "log", s1: "INFO", s2: "no destinations" }
  expect: ["ok", "ok", "ok"]
