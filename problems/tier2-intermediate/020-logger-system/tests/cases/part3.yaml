- name: single_destination
  call: logger_simulate
  args:
    - - { kind: "reset" }
      - { kind: "set_level", s1: "DEBUG" }
      - { kind: "add_dest", s1: "test:0:plain" }
      - { kind: "log", s1: "INFO", s2: "hello dest" }
      - { kind: "dest_size", s1: "test:0" }
      - { kind: "dest_contains", s1: "test:0", i1: 0, s2: "INFO" }
      - { kind: "dest_contains", s1: "test:0", i1: 0, s2: "hello dest" }
      - { kind: "rm_dest", s1: "test:0" }
  expect: ["ok", "ok", "ok", "ok", "1", "yes", "yes", "ok"]

- name: multiple_destinations
  call: logger_simulate
  args:
    - - { kind: "reset" }
      - { kind: "set_level", s1: "DEBUG" }
      - { kind: "add_dest", s1: "test:0:plain" }
      - { kind: "add_dest", s1: "test:1:json" }
      - { kind: "log", s1: "ERROR", s2: "multi dest" }
      - { kind: "dest_size", s1: "test:0" }
      - { kind: "dest_size", s1: "test:1" }
      - { kind: "dest_contains", s1: "test:0", i1: 0, s2: "[ERROR]" }
      - { kind: "dest_contains", s1: "test:1", i1: 0, s2: "\"level\"" }
      - { kind: "rm_dest", s1: "test:0" }
      - { kind: "rm_dest", s1: "test:1" }
  expect: ["ok", "ok", "ok", "ok", "ok", "1", "1", "yes", "yes", "ok", "ok"]

